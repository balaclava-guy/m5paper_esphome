substitutions:
  name: it8951e-test-suite
  friendly_name: IT8951E Test Suite

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.2.1
  on_boot:
    priority: -100
    then:
      - script.execute: render_current_page

esp32:
  board: m5stack_paper
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT: "y"
      CONFIG_ESP_TASK_WDT_PANIC: "n"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "15"

ota:
  - platform: esphome
    password: !secret testing_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "It8951E-Test-Suite"
    password: !secret fallback_password

captive_portal:

external_components:
  # Your fork (branch left as default "main")
  - source: github://balaclava-guy/m5paper_esphome
    # always git pull the latest
    refresh: 0s

logger:
  level: DEBUG

psram:

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO12
  miso_pin: GPIO13

m5paper:
  battery_power_pin: GPIO5
  main_power_pin: GPIO2

font:
  - file: "gfonts://Roboto Mono"
    id: mono_16
    size: 16
  - file: "gfonts://Roboto Mono"
    id: mono_22
    size: 22
  - file: "gfonts://Roboto Mono"
    id: mono_36
    size: 36

image:
  - file: "/config/esphome/images/general/bcg-monogram-white.png"
    id: status_logo
    type: BINARY
    resize: 90x90

globals:
  - id: current_page
    type: int
    restore_value: no
    initial_value: "0"
  - id: test_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: needs_full_clear
    type: bool
    restore_value: no
    initial_value: "true"
  - id: anim_frame
    type: int
    restore_value: no
    initial_value: "0"
  - id: anim_prev_x
    type: int
    restore_value: no
    initial_value: "60"
  - id: anim_initialized
    type: bool
    restore_value: no
    initial_value: "false"

display:
  - platform: it8951e
    id: m5paper_display
    model: M5EPD
    cs_pin: GPIO15
    reset_pin: GPIO23
    reset_duration: 200ms
    busy_pin: GPIO27
    rotation: 0
    reversed: true
    update_interval: never
    full_update_every: 0
    sleep_when_done: true
    lambda: |-
      const int page = id(current_page);
      const bool active = id(test_active);

      const int test_x = 20;
      const int test_y = 144;
      const int test_w = 920;
      const int test_h = 382;

      Color white(255, 255, 255);
      Color black(0, 0, 0);
      Color dark(80, 80, 80);

      if (id(needs_full_clear)) {
        it.fill(white);
        id(needs_full_clear) = false;
      }

      auto draw_header = [&](const char *title, const char *subtitle) {
        it.filled_rectangle(0, 0, 960, 96, black);
        it.print(12, 8, id(mono_22), white, title);
        it.print(12, 44, id(mono_16), white, subtitle);
        it.image(860, 4, id(status_logo));
        it.line(0, 96, 959, 96, black);
      };

      auto draw_splash = [&](const char *mode, const char *expected, const char *notes) {
        it.filled_rectangle(0, 98, 960, 442, white);
        it.printf(20, 112, id(mono_22), black, "Page %d/9  Mode %s  (SPLASH)", page + 1, mode);
        it.print(20, 158, id(mono_16), black, "Expected:");
        it.print(20, 186, id(mono_16), black, expected);
        it.print(20, 242, id(mono_16), black, "Setup / teardown:");
        it.print(20, 270, id(mono_16), black, "- Entering a test runs a GC16 conditioning pass");
        it.print(20, 298, id(mono_16), black, "- Leaving a test returns here without forcing full-screen redraw");
        it.print(20, 326, id(mono_16), black, notes);
        it.print(20, 384, id(mono_16), dark, "Center: run this test   Left/Right: change test   Double-center: home");
      };

      if (page == 0) {
        draw_header("IT8951E Test Harness", "Status/Home");
        it.filled_rectangle(0, 98, 960, 442, white);
        it.print(20, 118, id(mono_22), black, "Navigation");
        it.print(20, 156, id(mono_16), black, "- Right/Left moves between pages");
        it.print(20, 184, id(mono_16), black, "- Center enters/reruns selected test");
        it.print(20, 212, id(mono_16), black, "- Double-center returns here");
        it.print(20, 258, id(mono_16), black, "This suite keeps a stable header and updates mainly in the test window.");
        it.print(20, 286, id(mono_16), black, "Use pages 1..8 to run DU/DU4/A2/GL16/GC16/GLR16/GLD16/INIT.");
        it.print(20, 350, id(mono_16), dark, "Image path: /config/esphome/images/general/bcg-monogram-white.png");
        id(anim_initialized) = false;
        return;
      }

      if (!active) {
        switch (page) {
          case 1:
            draw_header("DU", "Fast B/W partial updates");
            draw_splash("DU", "Very fast black/white transitions, highest ghosting risk.", "Use this for cursors/menus/quick text changes.");
            break;
          case 2:
            draw_header("DU4", "Fast 4-gray update");
            draw_splash("DU4", "Fast update with limited grayscale precision.", "Useful for anti-aliased menu content.");
            break;
          case 3:
            draw_header("A2", "Fast animation mode");
            draw_splash("A2", "Fastest repeated motion for simple black/white animation.", "This run uses a small moving block region for responsiveness.");
            break;
          case 4:
            draw_header("GL16", "Sparse text on white");
            draw_splash("GL16", "Reduced flash for text-like sparse content.", "Best for documents and dashboards with mostly white background.");
            break;
          case 5:
            draw_header("GC16", "High-quality grayscale");
            draw_splash("GC16", "Best visual quality and grayscale fidelity.", "Slower than DU/DU4 but better artifact control.");
            break;
          case 6:
            draw_header("GLR16", "Sparse content with artifact control");
            draw_splash("GLR16", "Improved sparse-content transitions with reduced artifacts.", "Compare against GL16 and GC16 using checkerboard/text edges.");
            break;
          case 7:
            draw_header("GLD16", "Mixed graphics/text");
            draw_splash("GLD16", "Balanced quality for mixed UI graphics and text.", "Observe edges, circles, and fill transitions.");
            break;
          case 8:
            draw_header("INIT", "Full panel cleanup");
            draw_splash("INIT", "Initialization waveform that clears residual ghosting.", "Running this test intentionally ends on a clean white panel.");
            break;
          default:
            draw_header("Invalid page", "Returning to home is recommended");
            draw_splash("N/A", "Unexpected page index", "Use double-center to reset.");
            break;
        }
        id(anim_initialized) = false;
        return;
      }

      switch (page) {
        case 1:
          draw_header("DU", "Running");
          it.filled_rectangle(test_x, test_y, test_w, test_h, white);
          it.rectangle(test_x, test_y, test_w, test_h, black);
          it.print(test_x + 18, test_y + 14, id(mono_16), black, "High-contrast dynamic text:");
          for (int i = 0; i < 9; i++) {
            it.printf(test_x + 24, test_y + 52 + i * 30, id(mono_16), black, "DU row %02d  0123456789", i + 1);
          }
          it.filled_rectangle(test_x + 560 + ((id(anim_frame) % 8) * 40), test_y + 265, 120, 64, black);
          id(anim_initialized) = false;
          break;

        case 2:
          draw_header("DU4", "Running");
          it.filled_rectangle(test_x, test_y, test_w, test_h, white);
          it.rectangle(test_x, test_y, test_w, test_h, black);
          for (int i = 0; i < 4; i++) {
            const int g = i * 85;
            it.filled_rectangle(test_x + 24 + i * 180, test_y + 40, 150, 180, Color(g, g, g));
            it.printf(test_x + 44 + i * 180, test_y + 230, id(mono_16), black, "Gray %d", i);
          }
          it.print(test_x + 24, test_y + 300, id(mono_16), black, "Expected: faster than GC16, lower grayscale quality.");
          id(anim_initialized) = false;
          break;

        case 3: {
          draw_header("A2", "Running animation window");
          if (!id(anim_initialized)) {
            it.filled_rectangle(test_x, test_y, test_w, test_h, white);
            it.rectangle(test_x, test_y, test_w, test_h, black);
            it.print(test_x + 20, test_y + 16, id(mono_16), black, "A2: small-region motion test");
            id(anim_prev_x) = test_x + 40;
            id(anim_initialized) = true;
          }
          const int y = test_y + 92;
          const int w = 92;
          const int h = 170;
          const int x = test_x + 40 + ((id(anim_frame) % 16) * 48);
          it.filled_rectangle(id(anim_prev_x), y, w, h, white);
          it.filled_rectangle(x, y, w, h, black);
          it.printf(test_x + 20, test_y + 286, id(mono_16), black, "frame=%d", id(anim_frame));
          it.print(test_x + 220, test_y + 286, id(mono_16), black, "If still slow, switch mode/page immediately with Right/Left.");
          id(anim_prev_x) = x;
          break;
        }

        case 4:
          draw_header("GL16", "Running");
          it.filled_rectangle(test_x, test_y, test_w, test_h, white);
          it.rectangle(test_x, test_y, test_w, test_h, black);
          it.print(test_x + 24, test_y + 40, id(mono_36), black, "Roboto Mono");
          it.print(test_x + 24, test_y + 100, id(mono_22), black, "The quick brown fox jumps over the lazy dog.");
          it.line(test_x + 24, test_y + 150, test_x + 880, test_y + 150, black);
          it.line(test_x + 24, test_y + 178, test_x + 880, test_y + 178, black);
          it.print(test_x + 24, test_y + 244, id(mono_16), black, "Expected: sparse updates with reduced flash compared to GC16.");
          id(anim_initialized) = false;
          break;

        case 5:
          draw_header("GC16", "Running");
          it.filled_rectangle(test_x, test_y, test_w, test_h, white);
          it.rectangle(test_x, test_y, test_w, test_h, black);
          for (int i = 0; i < 16; i++) {
            const int x = test_x + 18 + i * 55;
            const int gray = i * 17;
            it.filled_rectangle(x, test_y + 36, 50, 250, Color(gray, gray, gray));
            it.printf(x + 8, test_y + 298, id(mono_16), black, "%02d", i);
          }
          id(anim_initialized) = false;
          break;

        case 6:
          draw_header("GLR16", "Running");
          it.filled_rectangle(test_x, test_y, test_w, test_h, white);
          it.rectangle(test_x, test_y, test_w, test_h, black);
          for (int y = test_y + 24; y < test_y + 324; y += 28) {
            for (int x = test_x + 24; x < test_x + 900; x += 28) {
              const bool on = ((x / 28) + (y / 28)) % 2 == 0;
              const int g = on ? 32 : 224;
              it.filled_rectangle(x, y, 28, 28, Color(g, g, g));
            }
          }
          it.print(test_x + 24, test_y + 338, id(mono_16), black, "Expected: cleaner sparse transitions than DU/DU4.");
          id(anim_initialized) = false;
          break;

        case 7:
          draw_header("GLD16", "Running");
          it.filled_rectangle(test_x, test_y, test_w, test_h, white);
          it.rectangle(test_x, test_y, test_w, test_h, black);
          it.rectangle(test_x + 24, test_y + 36, 420, 250, black);
          it.filled_rectangle(test_x + 44, test_y + 56, 120, 100, Color(40, 40, 40));
          it.filled_rectangle(test_x + 184, test_y + 56, 230, 100, Color(150, 150, 150));
          it.circle(test_x + 560, test_y + 126, 60, black);
          it.filled_circle(test_x + 710, test_y + 126, 60, Color(200, 200, 200));
          it.filled_circle(test_x + 850, test_y + 126, 50, Color(80, 80, 80));
          it.print(test_x + 24, test_y + 314, id(mono_16), black, "Expected: balanced text/graphics quality with reduced artifacts.");
          id(anim_initialized) = false;
          break;

        case 8:
          draw_header("INIT", "Running cleanup sequence");
          it.filled_rectangle(test_x, test_y, test_w, test_h, white);
          it.rectangle(test_x, test_y, test_w, test_h, black);
          for (int y = test_y + 20; y < test_y + 350; y += 22) {
            it.line(test_x + 20, y, test_x + 900, y, (y / 22) % 2 ? black : dark);
          }
          it.print(test_x + 24, test_y + 320, id(mono_16), black, "INIT will now clear the panel to remove ghosting.");
          id(anim_initialized) = false;
          break;

        default:
          draw_header("Invalid page", "Running");
          it.filled_rectangle(test_x, test_y, test_w, test_h, white);
          it.print(test_x + 24, test_y + 40, id(mono_22), black, "Invalid page index");
          id(anim_initialized) = false;
          break;
      }

script:
  - id: render_current_page
    mode: restart
    then:
      - lambda: |-
          id(current_page) = 0;
          id(test_active) = false;
          id(needs_full_clear) = true;
          id(anim_frame) = 0;
          id(anim_initialized) = false;
      - component.update: m5paper_display
      - it8951e.update:
          id: m5paper_display
          mode: GC16
          full: true

  - id: reset_to_home
    mode: restart
    then:
      - lambda: |-
          id(current_page) = 0;
          id(test_active) = false;
          id(needs_full_clear) = true;
          id(anim_frame) = 0;
          id(anim_initialized) = false;
      - script.execute: show_current_page

  - id: start_test
    mode: restart
    then:
      - lambda: |-
          id(test_active) = true;
          id(needs_full_clear) = true;
          id(anim_frame) = 0;
          id(anim_initialized) = false;
      - component.update: m5paper_display
      - it8951e.update:
          id: m5paper_display
          mode: GC16
          full: true
      - script.execute: show_current_page

  - id: show_current_page
    mode: restart
    then:
      - component.update: m5paper_display
      - if:
          condition:
            lambda: 'return id(current_page) == 0 || !id(test_active);'
          then:
            - it8951e.update:
                id: m5paper_display
                mode: GC16
                full: false
      - if:
          condition:
            lambda: 'return id(current_page) == 1 && id(test_active);'
          then:
            - it8951e.update:
                id: m5paper_display
                mode: DU
                full: false
      - if:
          condition:
            lambda: 'return id(current_page) == 2 && id(test_active);'
          then:
            - it8951e.update:
                id: m5paper_display
                mode: DU4
                full: false
      - if:
          condition:
            lambda: 'return id(current_page) == 3 && id(test_active);'
          then:
            - it8951e.update:
                id: m5paper_display
                mode: A2
                full: false
      - if:
          condition:
            lambda: 'return id(current_page) == 4 && id(test_active);'
          then:
            - it8951e.update:
                id: m5paper_display
                mode: GL16
                full: false
      - if:
          condition:
            lambda: 'return id(current_page) == 5 && id(test_active);'
          then:
            - it8951e.update:
                id: m5paper_display
                mode: GC16
                full: false
      - if:
          condition:
            lambda: 'return id(current_page) == 6 && id(test_active);'
          then:
            - it8951e.update:
                id: m5paper_display
                mode: GLR16
                full: false
      - if:
          condition:
            lambda: 'return id(current_page) == 7 && id(test_active);'
          then:
            - it8951e.update:
                id: m5paper_display
                mode: GLD16
                full: false
      - if:
          condition:
            lambda: 'return id(current_page) == 8 && id(test_active);'
          then:
            - it8951e.update:
                id: m5paper_display
                mode: INIT
                full: true
            - lambda: |-
                id(test_active) = false;
                id(needs_full_clear) = true;
            - delay: 500ms
            - script.execute: show_current_page

binary_sensor:
  # GPIO39 is mapped as NEXT because on some units this corresponds to the
  # physical right jog direction.
  - platform: gpio
    id: jog_next
    internal: true
    pin:
      number: GPIO39
      mode: INPUT
      inverted: true
    on_release:
      then:
        - lambda: |-
            id(current_page) = (id(current_page) + 1) % 9;
            id(test_active) = false;
            id(needs_full_clear) = true;
            id(anim_initialized) = false;
        - script.execute: show_current_page

  # GPIO37 is mapped as PREVIOUS to match the opposite jog direction.
  - platform: gpio
    id: jog_previous
    internal: true
    pin:
      number: GPIO37
      mode: INPUT
      inverted: true
    on_release:
      then:
        - lambda: |-
            id(current_page)--;
            if (id(current_page) < 0) {
              id(current_page) = 8;
            }
            id(test_active) = false;
            id(needs_full_clear) = true;
            id(anim_initialized) = false;
        - script.execute: show_current_page

  - platform: gpio
    id: jog_center
    internal: true
    pin:
      number: GPIO38
      mode: INPUT
      inverted: true
    on_multi_click:
      - timing:
          - ON for at most 350ms
          - OFF for at most 300ms
          - ON for at most 350ms
          - OFF for at least 200ms
        then:
          - script.execute: reset_to_home
      - timing:
          - ON for at most 350ms
          - OFF for at least 300ms
        then:
          - if:
              condition:
                lambda: 'return id(current_page) == 0;'
              then:
                - script.execute: show_current_page
          - if:
              condition:
                lambda: 'return id(current_page) != 0 && !id(test_active);'
              then:
                - script.execute: start_test
          - if:
              condition:
                lambda: 'return id(current_page) != 0 && id(test_active);'
              then:
                - script.execute: show_current_page

interval:
  - interval: 400ms
    then:
      - if:
          condition:
            lambda: 'return id(current_page) == 3 && id(test_active);'
          then:
            - lambda: |-
                id(anim_frame)++;
            - script.execute: show_current_page
