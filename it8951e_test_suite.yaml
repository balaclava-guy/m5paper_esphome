      - if:
          condition:
            lambda: 'return id(current_page) == 8 && id(test_progress_state) != 0;'
          then:
            - lambda: |-
                id(update_started_ms) = millis();
            - it8951e.update:
                id: m5paper_display
                mode: INIT
                full: true
            - lambda: |-
                id(display_last_update_ms) = millis() - id(update_started_ms);
                if (id(display_last_update_ms) > id(display_max_update_ms)) {
                  id(display_max_update_ms) = id(display_last_update_ms);
                }
                id(test_progress_state) = 2;
                id(test_progress_pct) = 100;
                id(test_last_duration_ms) = millis() - id(test_start_ms);
                id(test_completed)++;
                id(report_pending) = true;
                id(test_active) = false;
                id(needs_full_clear) = true;
            - script.execute: export_demo_report
            - delay: 250ms
            - script.execute: reset_to_home
      - if:
          condition:
            lambda: 'return id(report_pending);'
          then:
            - script.execute: export_demo_report
            - lambda: |-
                id(report_pending) = false;
      - if:
          condition:
            lambda: 'return id(display_last_update_ms) > 4000;'
          then:
            - lambda: |-
                id(slow_update_count)++;
                ESP_LOGW("it8951e.demo", "Slow display update: %lu ms (demo=%d progress=%d active=%d)",
                         static_cast<unsigned long>(id(display_last_update_ms)), id(current_page),
                         id(test_progress_state), id(test_active) ? 1 : 0);

binary_sensor:
  # GPIO39 is mapped as NEXT because on some units this corresponds to the
  # physical right jog direction.
  - platform: gpio
    id: jog_next
    internal: true
    pin:
      number: GPIO39
      mode: INPUT
      inverted: true
    on_release:
      then:
        - script.stop: start_demo
        - script.stop: show_current_page
        - lambda: |-
            if (id(test_active)) {
              id(nav_interrupt_count)++;
            }
            id(current_page) = (id(current_page) + 1) % 9;
            id(test_active) = false;
            id(needs_full_clear) = true;
            id(anim_initialized) = false;
            id(test_progress_state) = 0;
            id(test_progress_pct) = 0;
            id(report_pending) = false;
            id(anim_last_sample_ms) = 0;
            id(anim_last_sample_frame) = 0;
            id(anim_fps_x10) = 0;
        - script.execute: show_current_page

  # GPIO37 is mapped as PREVIOUS to match the opposite jog direction.
  - platform: gpio
    id: jog_previous
    internal: true
    pin:
      number: GPIO37
      mode: INPUT
      inverted: true
    on_release:
      then:
        - script.stop: start_demo
        - script.stop: show_current_page
        - lambda: |-
            if (id(test_active)) {
              id(nav_interrupt_count)++;
            }
            id(current_page)--;
            if (id(current_page) < 0) {
              id(current_page) = 8;
            }
            id(test_active) = false;
            id(needs_full_clear) = true;
            id(anim_initialized) = false;
            id(test_progress_state) = 0;
            id(test_progress_pct) = 0;
            id(report_pending) = false;
            id(anim_last_sample_ms) = 0;
            id(anim_last_sample_frame) = 0;
            id(anim_fps_x10) = 0;
        - script.execute: show_current_page

  - platform: gpio
    id: jog_center
    internal: true
    pin:
      number: GPIO38
      mode: INPUT
      inverted: true
    on_multi_click:
      - timing:
          - ON for at least 1200ms
          - OFF for at least 250ms
        then:
          - script.execute: export_demo_report
      - timing:
          - ON for at most 350ms
          - OFF for at most 300ms
          - ON for at most 350ms
          - OFF for at least 200ms
        then:
          - script.execute: reset_to_home
      - timing:
          - ON for at most 350ms
          - OFF for at least 300ms
        then:
          - if:
              condition:
                lambda: 'return id(current_page) == 0;'
              then:
                - script.execute: show_current_page
          - if:
              condition:
                lambda: 'return id(current_page) != 0 && !id(test_active);'
              then:
                - script.execute: start_demo
          - if:
              condition:
                lambda: 'return id(current_page) != 0 && id(test_active);'
              then:
                - script.execute: start_demo

interval:
  - interval: 700ms
    then:
      - if:
          condition:
            lambda: 'return id(current_page) == 3 && id(test_active) && id(test_progress_state) == 1;'
          then:
            - lambda: |-
                const uint32_t now = millis();
                if (id(anim_last_sample_ms) == 0) {
                  id(anim_last_sample_ms) = now;
                  id(anim_last_sample_frame) = id(anim_frame);
                } else {
                  const uint32_t dt = now - id(anim_last_sample_ms);
                  if (dt >= 1000) {
                    const int frame_delta = id(anim_frame) - id(anim_last_sample_frame);
                    id(anim_fps_x10) = (frame_delta * 10000) / static_cast<int>(dt);
                    id(anim_last_sample_ms) = now;
                    id(anim_last_sample_frame) = id(anim_frame);
                  }
                }
                id(anim_frame)++;
                if (id(anim_target_frames) > 0) {
                  const int progress = 10 + ((id(anim_frame) * 80) / id(anim_target_frames));
                  id(test_progress_pct) = progress > 95 ? 95 : progress;
                }
                if (id(anim_frame) >= id(anim_target_frames)) {
                  id(test_progress_state) = 2;
                  id(test_progress_pct) = 100;
                  id(test_last_duration_ms) = millis() - id(test_start_ms);
                  id(test_completed)++;
                  id(test_active) = false;
                  id(report_pending) = true;
                }
            - script.execute: show_current_page
